name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create CI env file
        run: |
          {
            echo "PORT=4000"
            echo "FRONTEND_BASE_URL=http://localhost:3000"
            echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:4000' }}"
            echo "SECRET_KEY=ci_demo_secret"
            echo "ADMIN_USERNAME=admin"
            echo "ADMIN_PASSWORD=admin"
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}"
            echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}"
            echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "OPENAI_CHAT_MODEL=gpt-4o-mini"
            echo "ENABLE_RAG_DEBUG=true"
            echo "LOG_REQUESTS=0"
          } >> .env.local

      - name: Lint check
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check required CI env variables
        run: |
          echo "Checking env variables..."
          if [ ! -f .env.local ]; then
            echo "Error: .env.local file not found."
            exit 1
          fi
          if ! grep -q "NEXT_PUBLIC_API_BASE_URL" .env.local; then
            echo "Error: Missing NEXT_PUBLIC_API_BASE_URL in .env.local."
            exit 1
          fi
          if ! grep -q "SECRET_KEY" .env.local; then
            echo "Error: Missing SECRET_KEY in .env.local."
            exit 1
          fi
          echo "Required CI environment variables are set. Stripe and OpenAI keys are optional for demo fallback."

      - name: Deploy to Vercel
        if: github.event_name == 'push'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TELEMETRY_CONSENT: 'no'
        run: |
          echo "Deploying to Vercel..."
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN is not set. Skipping Vercel deployment."
            exit 0
          fi

          if ! npx vercel@latest whoami --token "$VERCEL_TOKEN"; then
            echo "::warning::VERCEL_TOKEN is invalid. Generate a new token in Vercel and update the GitHub Actions secret."
            exit 0
          fi

          npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Backend smoke check
        if: github.event_name == 'push'
        run: |
          echo "Starting Express backend for a smoke check..."
          node server.js &
          SERVER_PID=$!
          sleep 5
          curl --fail http://localhost:4000/games
          kill "$SERVER_PID"
